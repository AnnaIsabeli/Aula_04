<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    
    <head>
        <title>Lista de Alunos</title>
    </head>

    <body>
        <h1>Lista de Alunos</h1>
        <a href="/alunos/novo">Novo Aluno</a> 

        <table border="1">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Curso</th>
                <th>Ações</th>
            </tr>

            <tr th:each="aluno : ${alunos}">
                <td th:text="${aluno.id}"></td>
                <td th:text="${aluno.nome}"></td>
                <td th:text="${aluno.email}"></td>
                <td th:text="${aluno.curso}"></td>

                <td>
                    <a th:href="@{/aluno/editar/{id}(id=${aluno.id})}">Editar</a>
                    <a th:href="@{/aluno/excluir/{id}(id=${aluno.id})}">Excluir</a>
                </td>
            </tr>
        </table>
    </body>
</html>
